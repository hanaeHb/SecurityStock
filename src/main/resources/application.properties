# Nom de l'application
spring.application.name=Security_Stock

# Database PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/security_stock_db
spring.datasource.username=postgres
spring.datasource.password=hanae
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP pool configuration (to prevent too many connections)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Port de l'application
server.port=8096

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Spring Boot 3
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# JWT keys
jwt.refresh-token.expiration=604800000
rsa.publickey=classpath:keys/publicKey.pem
rsa.privatekey=classpath:keys/privateKey.pem

# JSON formatting
spring.jackson.serialization.indent_output=true
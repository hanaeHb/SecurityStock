# Nom de l'application
spring.application.name=SECURITY-STOCK

# Database MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/security_stock_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=


# JPA / Hibernate
hibernate.dialect=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.hibernate.ddl-auto= update
spring.jpa.show-sql=true

# Port de l'application
server.port=8098

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Spring Boot 3
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# JWT keys
jwt.refresh-token.expiration=604800000
rsa.publickey=classpath:keys/publicKey.pem
rsa.privatekey=classpath:keys/privateKey.pem

# JSON formatting
spring.jackson.serialization.indent_output=true


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=admingostock@gmail.com
spring.mail.password=kojirkxjzeizjheq
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.consumer.key-serializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-serializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=security-service-group